}

/* ============================= LIGHTWEIGHT MOTION STUBS ============================= */
function MotionDiv({ children, className = "", style = {}, initial, animate, whileHover, whileInView, viewport, transition, exit, onClick, ...rest }) {
  const target = animate || whileInView;
  const merged = { ...style };
  if (target && typeof target.width !== "undefined") merged.width = target.width;
  if (transition) merged.transition = `all ${transition.duration || 0.3}s ease`;
  const cls = [className, initial ? "fade-in-up" : "", whileHover ? "hover-lift" : ""].filter(Boolean).join(" ");
  const animStyle = initial ? { animationDelay: `${(transition && transition.delay) || 0}s`, animationDuration: `${(transition && transition.duration) || 0.4}s` } : {};
  return <div className={cls} style={{ ...merged, ...animStyle }} onClick={onClick} {...rest}>{children}</div>;
}
const motion = { div: MotionDiv };
function AnimatePresence({ children }) { return <React.Fragment>{children}</React.Fragment>; }

/* ============================= DESIGN TOKENS (unchanged brand) ============================= */
const COLORS = {
  primary: "#2563EB", primaryLight: "#93C5FD", success: "#10B981", warning: "#F59E0B",
  danger: "#EF4444", purple: "#7C3AED", orange: "#F97316", cyan: "#06B6D4",
};
const PIE_PALETTE = [COLORS.primary, COLORS.success, COLORS.warning, COLORS.purple, COLORS.danger, COLORS.cyan];

const theme = {
  light: {
    appBg: "#F8FAFC", panelBg: "#F1F5F9", cardBg: "#FFFFFF", sidebarBg: "#FFFFFF",

    borderSoft: "#1B2436", gridStroke: "#1E2A40", inputBg: "#0B1220",
  },
};

/* ============================= SYNTHETIC DATA ============================= */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(88172645);
const pick = (arr, weights) => {
  if (!weights) return arr[Math.floor(rand() * arr.length)];
  const total = weights.reduce((a, b) => a + b, 0);
  let r = rand() * total;
  for (let i = 0; i < arr.length; i++) { r -= weights[i]; if (r <= 0) return arr[i]; }
  return arr[arr.length - 1];
};

const MONTHS = ["Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"];
const BANKS = ["SBI", "HDFC", "ICICI", "Axis", "Kotak", "BOB", "PNB", "IDFC First", "Yes Bank", "IndusInd"];
const BANK_WEIGHTS = [22, 18, 16, 11, 9, 7, 5, 5, 4, 3];
const CITIES = ["Delhi", "Mumbai", "Hyderabad", "Bangalore", "Kolkata", "Pune", "Chennai", "Ahmedabad"];
const CITY_WEIGHTS = [19, 22, 12, 17, 9, 10, 8, 6];
const DEVICES = ["Android", "iOS", "Web"];
const DEVICE_WEIGHTS = [64, 27, 9];
const PAYMENT_METHODS = ["UPI ID", "QR", "Bank Transfer", "Wallet", "Cards"];
const PAYMENT_WEIGHTS = [34, 28, 18, 12, 8];
const STATUSES = ["Success", "Failed", "Pending", "Cancelled"];
const STATUS_WEIGHTS = [91, 5, 2.5, 1.5];
const CATEGORIES = ["Food", "Shopping", "Recharge", "Travel", "Healthcare", "Education", "Bills", "Entertainment"];
const CATEGORY_WEIGHTS = [20, 18, 14, 11, 9, 8, 12, 8];
const CATEGORY_AMOUNT_RANGE = {
  Food: [120, 900], Shopping: [400, 6000], Recharge: [49, 999], Travel: [300, 12000],
  Healthcare: [150, 5000], Education: [500, 15000], Bills: [200, 8000], Entertainment: [99, 1500],
};
const FAILURE_REASONS = ["Network Error", "Insufficient Balance", "Bank Server Down", "Timeout", "Incorrect PIN", "Technical Failure"];
const FAILURE_WEIGHTS = [30, 24, 18, 12, 9, 7];
// Hourly weights shaped around lunch (12-14) and evening (18-21) peaks
const HOUR_WEIGHTS = [2,1,1,1,1,2,4,7,9,10,11,13,15,13,10,9,10,12,16,17,15,11,7,4];

const TXN_COUNT = 2600;
const USER_POOL = Array.from({ length: 940 }, (_, i) => `TP${(100000 + i).toString().slice(1)}`);
const MERCHANT_POOL = {
  Food: ["Zomato", "Swiggy", "Dominos", "CCD"], Shopping: ["Myntra", "Flipkart", "Amazon", "Ajio"],
  Recharge: ["Airtel", "Jio", "Vi", "BSNL"], Travel: ["IRCTC", "MakeMyTrip", "Ola", "Uber"],
  Healthcare: ["Apollo", "PharmEasy", "Practo", "1mg"], Education: ["Byju's", "Unacademy", "Coursera", "Vedantu"],
  Bills: ["Tata Power", "BSES", "Airtel Fiber", "MGL Gas"], Entertainment: ["BookMyShow", "Netflix", "Spotify", "PVR"],
};

function generateTransactions() {
  const rows = [];
  for (let i = 0; i < TXN_COUNT; i++) {
    const monthIdx = Math.min(11, Math.floor(rand() * 12 + (rand() < 0.35 ? rand() * 2 : 0)));
    const month = MONTHS[Math.min(11, monthIdx)];
    const category = pick(CATEGORIES, CATEGORY_WEIGHTS);
    const [lo, hi] = CATEGORY_AMOUNT_RANGE[category];
    const amount = Math.round(lo + rand() * (hi - lo));
    const status = pick(STATUSES, STATUS_WEIGHTS);
    const hour = pick(Array.from({ length: 24 }, (_, h) => h), HOUR_WEIGHTS);
    rows.push({
      id: `TXN${100000 + i}`, userId: pick(USER_POOL), month, day: 1 + Math.floor(rand() * 28), hour,
      amount, status, failureReason: status === "Failed" ? pick(FAILURE_REASONS, FAILURE_WEIGHTS) : null,
      paymentMethod: pick(PAYMENT_METHODS, PAYMENT_WEIGHTS),
      bank: pick(BANKS, BANK_WEIGHTS), city: pick(CITIES, CITY_WEIGHTS), device: pick(DEVICES, DEVICE_WEIGHTS),
      category, merchant: pick(MERCHANT_POOL[category]),
    });
  }
  return rows;
}
const ALL_TRANSACTIONS = generateTransactions();
const SCALE = 38.5;

/* ============================= HELPERS ============================= */
const fmtNum = (n) => new Intl.NumberFormat("en-IN").format(Math.round(n));
const fmtCompact = (n) => {
  if (n >= 1e7) return (n / 1e7).toFixed(2) + " Cr";
  if (n >= 1e5) return (n / 1e5).toFixed(2) + " L";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return fmtNum(n);
};
const fmtINR = (n) => "₹" + fmtCompact(n);
const fmtMoneyFull = (n) => "₹" + new Intl.NumberFormat("en-IN").format(Math.round(n));
const HOUR_LABEL = (h) => { const period = h < 12 ? "AM" : "PM"; const h12 = h % 12 === 0 ? 12 : h % 12; return `${h12}${period}`; };
const peakPeriodLabel = (h) => { if (h >= 5 && h < 12) return "morning"; if (h >= 12 && h < 17) return "afternoon"; if (h >= 17 && h < 22) return "evening"; return "late-night"; };

/* ============================= SMALL UI PRIMITIVES ============================= */
function Sparkline({ data, color, height = 34 }) {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * 100;
    const y = 100 - ((v - min) / (max - min || 1)) * 100;
    return `${x},${y}`;
  }).join(" ");
  const id = "spark-" + color.replace("#", "");
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: "100%", height }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <polyline points={`0,100 ${pts} 100,100`} fill={`url(#${id})`} stroke="none" />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Card({ t, className = "", children, style }) {
  return (
    <div className={`rounded-2xl border transition-shadow duration-300 ${className}`}
      style={{ background: t.cardBg, borderColor: t.border, boxShadow: "0 1px 2px rgba(15,23,42,0.04)", ...style }}>
      {children}
    </div>
  );
}

function SectionHeading({ t, title, subtitle, iconName }) {
  return (
    <div className="flex items-start justify-between mb-5">
      <div>
        <div className="flex items-center gap-2">
          {iconName && <Icon name={iconName} size={16} style={{ color: t.subtext }} />}
          <h3 className="text-sm font-semibold tracking-tight" style={{ color: t.text }}>{title}</h3>
        </div>
        {subtitle && <p className="text-xs mt-0.5" style={{ color: t.faint }}>{subtitle}</p>}
      </div>
    </div>
  );
}

function CustomTooltip({ active, payload, label, t, prefix = "" }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="rounded-xl border px-3.5 py-2.5 text-xs shadow-xl" style={{ background: t.cardBg, borderColor: t.border, color: t.text }}>
      {label !== undefined && <div className="font-semibold mb-1.5" style={{ color: t.text }}>{label}</div>}
      {payload.map((p, i) => (
        <div key={i} className="flex items-center gap-2 py-0.5" style={{ color: t.subtext }}>
          <span className="inline-block w-2 h-2 rounded-full" style={{ background: p.color || p.fill }} />
          <span>{p.name}:</span>
          <span className="font-semibold" style={{ color: t.text }}>{prefix}{typeof p.value === "number" ? fmtNum(p.value) : p.value}</span>
        </div>
      ))}
    </div>
  );
}

/* ============================= KPI CARD (premium, larger, gradient border) ============================= */
function KpiCard({ t, label, value, sub, iconName, color, trend, trendData, delay }) {
  const positive = trend >= 0;
  return (
    <motion.div initial={{ opacity: 0, y: 14 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.45, delay }} whileHover={{ y: -3 }}>
      <div className="hover-lift rounded-2xl p-[1.5px]" style={{ background: `linear-gradient(135deg, ${color}55, transparent 60%)` }}>
        <div className="rounded-2xl p-6 h-full" style={{ background: t.cardBg }}>
          <div className="flex items-start justify-between">
            <div className="w-12 h-12 rounded-2xl flex items-center justify-center" style={{ background: color + "17" }}>
              <Icon name={iconName} size={22} style={{ color }} />
            </div>
            <div className="flex items-center gap-1 text-xs font-bold px-2.5 py-1.5 rounded-full"
              style={{ color: positive ? COLORS.success : COLORS.danger, background: (positive ? COLORS.success : COLORS.danger) + "15" }}>
              <span>{positive ? "↑" : "↓"}</span>{Math.abs(trend).toFixed(1)}%
            </div>
          </div>
          <div className="mt-5">
            <div className="text-4xl font-extrabold tracking-tight leading-none" style={{ color: t.text }}>{value}</div>
            <div className="text-[13px] mt-2 font-medium" style={{ color: t.subtext }}>{label}</div>
          </div>
          <div className="mt-4 -mb-1"><Sparkline data={trendData} color={color} height={38} /></div>
          {sub && <div className="text-[11px] mt-1.5" style={{ color: t.faint }}>{sub}</div>}
        </div>
      </div>
    </motion.div>
  );
}

/* ============================= DONUT WITH EXPANDING ACTIVE SLICE ============================= */
function renderActiveSlice(props) {
  const { cx, cy, innerRadius, outerRadius, startAngle, endAngle, fill, payload, percent } = props;
  return (
    <g>
      <text x={cx} y={cy - 4} textAnchor="middle" fontSize="13" fontWeight="700" fill={fill}>{payload.name}</text>
      <text x={cx} y={cy + 14} textAnchor="middle" fontSize="12" fill="#94A3B8">{(percent * 100).toFixed(1)}%</text>
      <Sector cx={cx} cy={cy} innerRadius={innerRadius} outerRadius={outerRadius + 8} startAngle={startAngle} endAngle={endAngle} fill={fill} />
    </g>
  );
}

function InteractiveDonut({ data, colors, height = 260, t }) {
  const [active, setActive] = useState(-1);
  return (
    <ResponsiveContainer width="100%" height={height}>
      <PieChart>
        <Pie data={data} dataKey="value" nameKey="name" innerRadius={62} outerRadius={92} paddingAngle={3} cornerRadius={6}
          label={active === -1 ? ({ percent }) => `${(percent * 100).toFixed(0)}%` : false} labelLine={false} fontSize={10}
          activeIndex={active} activeShape={renderActiveSlice}
          onMouseEnter={(_, idx) => setActive(idx)} onMouseLeave={() => setActive(-1)}>
          {data.map((d, i) => (<Cell key={i} fill={colors[i % colors.length]} stroke="none" style={{ cursor: "pointer" }} />))}
        </Pie>
        <Tooltip content={<CustomTooltip t={t} />} />
        <Legend iconType="circle" wrapperStyle={{ fontSize: 11, color: t.subtext }} />
      </PieChart>
    </ResponsiveContainer>
  );
}

  { key: "transactions", label: "Transactions", iconName: "receipt" },
];

function Sidebar({ t, collapsed, setCollapsed, page, setPage }) {
  return (
    <motion.div animate={{ width: collapsed ? 76 : 232 }} transition={{ duration: 0.25 }}
      className="h-full flex flex-col border-r shrink-0" style={{ background: t.sidebarBg, borderColor: t.border }}>
      <div className="flex items-center gap-2.5 px-4 h-16 border-b" style={{ borderColor: t.border }}>
        <div className="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style={{ background: COLORS.primary }}>
          <Icon name="rupee" size={18} style={{ color: "#fff" }} />
        </div>
        {!collapsed && <span className="font-bold text-base tracking-tight" style={{ color: t.text }}>TrustPay</span>}
      </div>
      <nav className="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
        {NAV_ITEMS.map((item) => {
          const active = page === item.key;
          return (
            <button key={item.key} onClick={() => setPage(item.key)}
              className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors duration-150"
              style={{ background: active ? COLORS.primary + "15" : "transparent", color: active ? COLORS.primary : t.subtext }}>
              <Icon name={item.iconName} size={18} className="shrink-0" />
              {!collapsed && <span className="truncate">{item.label}</span>}
            </button>
          );
        })}
      </nav>
      <div className="p-3 border-t" style={{ borderColor: t.border }}>
        <button onClick={() => setCollapsed(!collapsed)} className="w-full flex items-center justify-center gap-2 py-2 rounded-xl text-xs font-medium" style={{ color: t.subtext, background: t.panelBg }}>
          {collapsed ? <Icon name="chevronRight" size={16} /> : <><Icon name="chevronLeft" size={16} /> Collapse</>}
        </button>
      </div>
    </motion.div>
  );
}

/* ============================= FILTER SELECT ============================= */
function FilterSelect({ t, label, value, options, onChange }) {
  return (
    <div className="relative">
      <select value={value} onChange={(e) => onChange(e.target.value)}
        className="appearance-none text-xs font-medium pl-3 pr-7 py-2 rounded-xl border cursor-pointer outline-none"
        style={{ background: t.inputBg, borderColor: t.border, color: t.text }}>
        <option value="All">{label}: All</option>
        {options.map((o) => (<option key={o} value={o}>{o}</option>))}
      </select>
      <Icon name="chevronDown" size={13} className="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none" style={{ color: t.faint }} />
    </div>
  );
}

/* ============================= SKELETON LOADER ============================= */
function DashboardSkeleton({ t, dark }) {
  const cls = dark ? "skeleton-dark" : "skeleton";
  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
        {[0, 1, 2, 3].map((i) => (<div key={i} className={`rounded-2xl ${cls}`} style={{ height: 176, border: `1px solid ${t.border}` }} />))}
      </div>
      <div className="grid grid-cols-1 xl:grid-cols-4 gap-4">
        <div className={`rounded-2xl xl:col-span-2 ${cls}`} style={{ height: 320, border: `1px solid ${t.border}` }} />
        <div className={`rounded-2xl ${cls}`} style={{ height: 320, border: `1px solid ${t.border}` }} />
        <div className={`rounded-2xl ${cls}`} style={{ height: 320, border: `1px solid ${t.border}` }} />
      </div>
      <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
        {[0, 1, 2].map((i) => (<div key={i} className={`rounded-2xl ${cls}`} style={{ height: 280, border: `1px solid ${t.border}` }} />))}
      </div>
    </div>
  );
}

/* ============================= MAIN APP ============================= */
function TrustPayDashboard() {
  const [darkMode, setDarkMode] = useState(false);
  const [collapsed, setCollapsed] = useState(false);
  const [page, setPage] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);
  const t = darkMode ? theme.dark : theme.light;

  useEffect(() => { const tm = setTimeout(() => setLoading(false), 750); return () => clearTimeout(tm); }, []);

  const [filters, setFilters] = useState({ year: "All", month: "All", city: "All", bank: "All", device: "All", status: "All", method: "All" });
  const updateFilter = (k, v) => setFilters((f) => ({ ...f, [k]: v }));
  const resetFilters = () => setFilters({ year: "All", month: "All", city: "All", bank: "All", device: "All", status: "All", method: "All" });

  const filtered = useMemo(() => {
    return ALL_TRANSACTIONS.filter((r) =>
      (filters.month === "All" || r.month === filters.month) &&
      (filters.city === "All" || r.city === filters.city) &&
      (filters.bank === "All" || r.bank === filters.bank) &&
      (filters.device === "All" || r.device === filters.device) &&
      (filters.status === "All" || r.status === filters.status) &&
      (filters.method === "All" || r.paymentMethod === filters.method)
    );
  }, [filters]);

  const searchResults = useMemo(() => {
    if (!search.trim()) return [];
    const q = search.toLowerCase();
    return ALL_TRANSACTIONS.filter((r) => r.userId.toLowerCase().includes(q) || r.merchant.toLowerCase().includes(q) || r.bank.toLowerCase().includes(q) || r.city.toLowerCase().includes(q)).slice(0, 6);
  }, [search]);

  const agg = useMemo(() => {
    const total = filtered.length * SCALE;
    const successRows = filtered.filter((r) => r.status === "Success");
    const successRate = filtered.length ? (successRows.length / filtered.length) * 100 : 0;
    const volume = filtered.reduce((s, r) => s + r.amount, 0) * SCALE;
    const activeUsers = new Set(filtered.map((r) => r.userId)).size * (SCALE * 0.27);
    const avgAmount = filtered.length ? filtered.reduce((s, r) => s + r.amount, 0) / filtered.length : 0;

    const byMonth = MONTHS.map((m) => {
      const rows = filtered.filter((r) => r.month === m);
      return { month: m, transactions: Math.round(rows.length * SCALE), revenue: Math.round(rows.reduce((s, r) => s + r.amount, 0) * SCALE) };
    });
    const byMethod = PAYMENT_METHODS.map((mth) => ({ name: mth, value: filtered.filter((r) => r.paymentMethod === mth).length })).filter((d) => d.value > 0);
    const byStatusAll = STATUSES.map((s) => ({ name: s, value: filtered.filter((r) => r.status === s).length }));
    const byStatus = byStatusAll.filter((d) => ["Success", "Failed", "Pending"].includes(d.name) && d.value > 0);
    const byBank = BANKS.map((b) => ({ name: b, volume: Math.round(filtered.filter((r) => r.bank === b).reduce((s, r) => s + r.amount, 0) * SCALE) })).sort((a, b) => b.volume - a.volume).slice(0, 10);
    const byDevice = DEVICES.map((d) => ({ name: d, value: filtered.filter((r) => r.device === d).length })).filter((d) => d.value > 0);
    const failedRows = filtered.filter((r) => r.status === "Failed");
    const byFailureReason = FAILURE_REASONS.map((f) => ({ name: f, value: failedRows.filter((r) => r.failureReason === f).length })).filter((d) => d.value > 0).sort((a, b) => b.value - a.value);
    const byHour = Array.from({ length: 24 }, (_, h) => ({ hour: HOUR_LABEL(h), h, transactions: Math.round(filtered.filter((r) => r.hour === h).length * SCALE) }));
    const peakHour = byHour.reduce((max, cur) => (cur.transactions > max.transactions ? cur : max), byHour[0]);

    return { total, successRate, volume, activeUsers, avgAmount, byMonth, byMethod, byStatus, byBank, byDevice, byFailureReason, byHour, peakHour };
  }, [filtered]);

  const insights = useMemo(() => {
    const topBank = agg.byBank[0];
    const androidShare = agg.byDevice.find((d) => d.name === "Android");
    const totalDeviceRows = agg.byDevice.reduce((s, d) => s + d.value, 0) || 1;
    const topDevice = agg.byDevice.slice().sort((a, b) => b.value - a.value)[0];
    const topFailure = agg.byFailureReason[0];
    const revenueMillions = Math.round(agg.volume / 1e6);
    return [
      `Success rate is ${agg.successRate.toFixed(2)}%.`,
      revenueMillions > 0 ? `Revenue crossed ₹${fmtNum(revenueMillions)} Million.` : null,
      topBank ? `${topBank.name} contributes the highest transaction volume at ${fmtINR(topBank.volume)}.` : null,
      topDevice ? `${topDevice.name} users dominate platform usage at ${((topDevice.value / totalDeviceRows) * 100).toFixed(0)}%.` : null,
      topFailure ? `${topFailure.name} is the most common failure reason.` : null,
      `Peak transaction activity occurs during ${peakPeriodLabel(agg.peakHour.h)} hours, around ${agg.peakHour.hour}.`,
    ].filter(Boolean);
  }, [agg]);

  const today = new Date().toLocaleDateString("en-IN", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  const trendSlice = (key) => agg.byMonth.map((m) => m[key]);

  return (
    <div className="flex w-full" style={{ height: "100vh", background: t.appBg }}>
      <Sidebar t={t} collapsed={collapsed} setCollapsed={setCollapsed} page={page} setPage={setPage} />

      <div className="flex-1 flex flex-col min-w-0">
        <div className="h-16 shrink-0 flex items-center justify-between px-6 border-b" style={{ borderColor: t.border, background: t.cardBg }}>
          <div className="flex items-center gap-3 min-w-0">
            <button onClick={() => setCollapsed(!collapsed)} className="p-2 rounded-xl" style={{ color: t.subtext }}><Icon name="menu" size={18} /></button>
            <div className="relative">
              <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color: t.faint }} />
              <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search user, merchant, bank, city…"
                className="pl-8 pr-3 py-2 rounded-xl text-xs border outline-none w-64" style={{ background: t.inputBg, borderColor: t.border, color: t.text }} />
              <AnimatePresence>
                {searchResults.length > 0 && (
                  <div className="fade-in absolute mt-2 w-80 rounded-2xl border shadow-xl z-30 overflow-hidden" style={{ background: t.cardBg, borderColor: t.border }}>
                    {searchResults.map((r) => (
                      <div key={r.id} className="px-3 py-2 text-xs border-b last:border-0" style={{ borderColor: t.borderSoft }}>
                        <div className="font-semibold" style={{ color: t.text }}>{r.userId} · {r.merchant}</div>
                        <div style={{ color: t.faint }}>{r.bank} · {r.city} · {fmtMoneyFull(r.amount)}</div>
                      </div>
                    ))}
                  </div>
                )}
              </AnimatePresence>
            </div>
          </div>

          <div className="flex items-center gap-2.5">
            <span className="text-xs mr-1 hidden lg:inline" style={{ color: t.subtext }}>{today}</span>
            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl" style={{ color: t.subtext, background: t.panelBg }} title="Toggle dark mode">
              <Icon name={darkMode ? "sun" : "moon"} size={16} />
            </button>
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ml-1" style={{ background: COLORS.primary, color: "#fff" }}>DR</div>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto">
          <div className="max-w-[1500px] mx-auto px-6 py-8 flex gap-6">
            <div className="flex-1 min-w-0 space-y-8">

              <div>
                <h1 className="text-2xl font-bold tracking-tight" style={{ color: t.text }}>TrustPay UPI Product Analytics Dashboard</h1>
                <p className="text-sm mt-1.5" style={{ color: t.subtext }}>Executive Business Overview</p>
              </div>

              <Card t={t} className="p-4">
                <div className="flex items-center gap-2 flex-wrap">
                  <div className="flex items-center gap-1.5 text-xs font-semibold mr-1" style={{ color: t.subtext }}><Icon name="filter" size={13} /> Filters</div>
                  <FilterSelect t={t} label="Year" value={filters.year} options={["FY 2025-26"]} onChange={(v) => updateFilter("year", v)} />
                  <FilterSelect t={t} label="Month" value={filters.month} options={MONTHS} onChange={(v) => updateFilter("month", v)} />
                  <FilterSelect t={t} label="Bank" value={filters.bank} options={BANKS} onChange={(v) => updateFilter("bank", v)} />
                  <FilterSelect t={t} label="City" value={filters.city} options={CITIES} onChange={(v) => updateFilter("city", v)} />
                  <FilterSelect t={t} label="Device" value={filters.device} options={DEVICES} onChange={(v) => updateFilter("device", v)} />
                  <FilterSelect t={t} label="Method" value={filters.method} options={PAYMENT_METHODS} onChange={(v) => updateFilter("method", v)} />
                  <FilterSelect t={t} label="Status" value={filters.status} options={STATUSES} onChange={(v) => updateFilter("status", v)} />
                  <button onClick={resetFilters} className="text-xs font-medium px-3 py-2 rounded-xl ml-auto" style={{ color: COLORS.primary, background: COLORS.primary + "12" }}>Reset all</button>
                </div>
              </Card>

              {loading ? (
                <DashboardSkeleton t={t} dark={darkMode} />
              ) : page === "dashboard" && (<>
                {/* KPI CARDS */}
                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5">
                  <KpiCard t={t} delay={0} label="Total Transactions" value={fmtCompact(agg.total)} iconName="creditCard" color={COLORS.primary} trend={4.8} trendData={trendSlice("transactions")} sub={`${fmtNum(agg.total)} transactions in selection`} />
                  <KpiCard t={t} delay={0.05} label="Success Rate" value={agg.successRate.toFixed(2) + "%"} iconName="checkCircle2" color={COLORS.success} trend={2.1} trendData={agg.byMonth.map((m) => m.transactions * (0.9 + rand() * 0.05))} sub="vs. previous period" />
                  <KpiCard t={t} delay={0.1} label="Total Transaction Volume" value={fmtINR(agg.volume)} iconName="rupee" color={COLORS.purple} trend={6.3} trendData={trendSlice("revenue")} sub={fmtMoneyFull(agg.volume)} />
                  <KpiCard t={t} delay={0.15} label="Active Users" value={fmtCompact(agg.activeUsers)} iconName="users" color={COLORS.orange} trend={3.4} trendData={agg.byMonth.map((m) => m.transactions * (0.3 + rand() * 0.1))} sub="Unique users transacting" />
                </div>

                {/* FIRST ANALYTICS ROW */}
                <div className="grid grid-cols-1 xl:grid-cols-4 gap-5">
                  <Card t={t} className="p-6 xl:col-span-2">
                    <SectionHeading t={t} title="Transactions Over Time" subtitle="Monthly trend · hover for crosshair detail" iconName="trendingUp" />
                    <ResponsiveContainer width="100%" height={300}>
                      <LineChart data={agg.byMonth} margin={{ left: -10, right: 10 }}>
                        <defs><linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor={COLORS.primary} /><stop offset="100%" stopColor={COLORS.purple} /></linearGradient></defs>
                        <CartesianGrid stroke={t.gridStroke} vertical={false} />
                        <XAxis dataKey="month" tick={{ fontSize: 11, fill: t.subtext }} axisLine={{ stroke: t.border }} tickLine={false} />
                        <YAxis tick={{ fontSize: 11, fill: t.subtext }} axisLine={false} tickLine={false} tickFormatter={fmtCompact} />
                        <Tooltip content={<CustomTooltip t={t} />} cursor={{ stroke: COLORS.primary, strokeWidth: 1, strokeDasharray: "4 4" }} />
                        <Line type="monotone" dataKey="transactions" name="Transactions" stroke="url(#lineGrad)" strokeWidth={3.5} dot={{ r: 3, fill: COLORS.primary, strokeWidth: 0 }} activeDot={{ r: 7, stroke: "#fff", strokeWidth: 2 }} isAnimationActive animationDuration={1400} animationEasing="ease-out" />
                      </LineChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card t={t} className="p-6">
                    <SectionHeading t={t} title="Payment Methods" subtitle="Hover to expand" iconName="wallet" />
                    <InteractiveDonut data={agg.byMethod} colors={PIE_PALETTE} t={t} />
                  </Card>

                  <Card t={t} className="p-6">
                    <SectionHeading t={t} title="Transaction Status" iconName="checkCircle2" />
                    <InteractiveDonut data={agg.byStatus} colors={agg.byStatus.map((s) => ({ Success: COLORS.success, Failed: COLORS.danger, Pending: COLORS.warning }[s.name]))} t={t} />
                  </Card>
                </div>

                {/* SECOND ANALYTICS ROW */}
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-5">
                  <Card t={t} className="p-6">
                    <SectionHeading t={t} title="Top Banks" subtitle="By transaction volume" iconName="landmark" />
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={agg.byBank} layout="vertical" margin={{ left: 10 }}>
                        <CartesianGrid stroke={t.gridStroke} horizontal={false} />
                        <XAxis type="number" tick={{ fontSize: 10, fill: t.subtext }} axisLine={false} tickLine={false} tickFormatter={fmtCompact} />
                        <YAxis type="category" dataKey="name" tick={{ fontSize: 11, fill: t.text }} axisLine={false} tickLine={false} width={70} />
                        <Tooltip content={<CustomTooltip t={t} prefix="₹" />} cursor={{ fill: t.panelBg }} />
                        <Bar dataKey="volume" name="Volume" radius={[0, 8, 8, 0]} fill={COLORS.primary} isAnimationActive animationDuration={900} />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card t={t} className="p-6">
                    <SectionHeading t={t} title="Failure Reasons" subtitle="Sorted by frequency" iconName="alertTriangle" />
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={agg.byFailureReason} layout="vertical" margin={{ left: 10 }}>
                        <CartesianGrid stroke={t.gridStroke} horizontal={false} />
                        <XAxis type="number" tick={{ fontSize: 10, fill: t.subtext }} axisLine={false} tickLine={false} />
                        <YAxis type="category" dataKey="name" tick={{ fontSize: 10.5, fill: t.text }} axisLine={false} tickLine={false} width={104} />
                        <Tooltip content={<CustomTooltip t={t} />} cursor={{ fill: t.panelBg }} />
                        <Bar dataKey="value" name="Count" radius={[0, 8, 8, 0]} fill={COLORS.danger} isAnimationActive animationDuration={900} />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card t={t} className="p-6">
                    <SectionHeading t={t} title="Transactions by Hour" subtitle={`Peak around ${agg.peakHour.hour}`} iconName="clock" />
                    <ResponsiveContainer width="100%" height={280}>
                      <AreaChart data={agg.byHour} margin={{ left: -18, right: 10 }}>
                        <defs><linearGradient id="hourGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={COLORS.cyan} stopOpacity={0.5} /><stop offset="100%" stopColor={COLORS.cyan} stopOpacity={0} /></linearGradient></defs>
                        <CartesianGrid stroke={t.gridStroke} vertical={false} />
                        <XAxis dataKey="hour" tick={{ fontSize: 9, fill: t.subtext }} axisLine={{ stroke: t.border }} tickLine={false} interval={2} />
                        <YAxis tick={{ fontSize: 10, fill: t.subtext }} axisLine={false} tickLine={false} tickFormatter={fmtCompact} />
                        <Tooltip content={<CustomTooltip t={t} />} />
                        <Area type="monotone" dataKey="transactions" name="Transactions" stroke={COLORS.cyan} strokeWidth={2.5} fill="url(#hourGrad)" isAnimationActive animationDuration={1100} />
                      </AreaChart>
                    </ResponsiveContainer>
                  </Card>
                </div>
              </>)}

              {!loading && page === "transactions" && (
                <Card t={t} className="p-6 overflow-x-auto">
                  <SectionHeading t={t} title="Transactions" subtitle={`${filtered.length} rows in current filter (sample)`} iconName="receipt" />
                  <table className="w-full text-xs">
                    <thead>
                      <tr style={{ color: t.faint }}>
                        {["ID", "User", "Merchant", "Bank", "City", "Amount", "Status", "Method"].map((h) => (<th key={h} className="text-left font-medium py-2 pr-4">{h}</th>))}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.slice(0, 40).map((r) => (
                        <tr key={r.id} className="border-t" style={{ borderColor: t.borderSoft }}>
                          <td className="py-2 pr-4" style={{ color: t.text }}>{r.id}</td>
                          <td className="py-2 pr-4" style={{ color: t.subtext }}>{r.userId}</td>
                          <td className="py-2 pr-4" style={{ color: t.subtext }}>{r.merchant}</td>
                          <td className="py-2 pr-4" style={{ color: t.subtext }}>{r.bank}</td>
                          <td className="py-2 pr-4" style={{ color: t.subtext }}>{r.city}</td>
                          <td className="py-2 pr-4 font-medium" style={{ color: t.text }}>{fmtMoneyFull(r.amount)}</td>
                          <td className="py-2 pr-4">
                            <span className="px-2 py-0.5 rounded-full text-[10px] font-semibold" style={{ color: { Success: COLORS.success, Failed: COLORS.danger, Pending: COLORS.warning, Cancelled: t.faint }[r.status], background: ({ Success: COLORS.success, Failed: COLORS.danger, Pending: COLORS.warning, Cancelled: t.faint }[r.status]) + "18" }}>{r.status}</span>
                          </td>
                          <td className="py-2 pr-4" style={{ color: t.subtext }}>{r.paymentMethod}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </Card>
              )}

              <div className="text-center py-6">
                <p className="text-xs font-medium" style={{ color: t.subtext }}>Built by Diksha Rana</p>
                <p className="text-[11px]" style={{ color: t.faint }}>Product Analytics Portfolio Project</p>
              </div>
            </div>

            {/* BUSINESS INSIGHTS PANEL */}
            <div className="w-72 shrink-0 hidden 2xl:block">
              <div className="sticky top-0 space-y-4">
                <Card t={t} className="p-6">
                  <div className="flex items-center gap-2 mb-5">
                    <div className="w-8 h-8 rounded-xl flex items-center justify-center pulse-ring" style={{ background: COLORS.primary + "17" }}>
                      <Icon name="sparkles" size={15} style={{ color: COLORS.primary }} />
                    </div>
                    <h3 className="text-sm font-bold" style={{ color: t.text }}>Business Insights</h3>
                  </div>
                  {loading ? (
                    <div className="space-y-3">{[0,1,2,3,4,5].map((i) => (<div key={i} className={darkMode ? "skeleton-dark" : "skeleton"} style={{ height: 46, borderRadius: 12 }} />))}</div>
                  ) : (
                    <div className="space-y-3">
                      {insights.map((ins, i) => (
                        <div key={i} className="fade-in-up flex items-start gap-2 text-xs rounded-xl p-3.5 leading-relaxed" style={{ background: t.panelBg, color: t.subtext, animationDelay: `${0.08 * i}s` }}>
                          <Icon name="arrowUpRight" size={13} className="mt-0.5 shrink-0" style={{ color: COLORS.primary }} />
                          <span>{ins}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </Card>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TrustPayDashboard />);
</script>
</body>
</html>
